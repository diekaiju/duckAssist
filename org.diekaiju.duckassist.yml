Summary: Lightweight privacy-focused WebView wrapper for Duck.ai

Description: |-
    DuckAssist is an Android WebView-based client for Duck.ai (DuckDuckGo's AI chat service).

    It provides a simplified interface for interacting with Duck.ai and integrates with Android system features such as assistant shortcuts and text sharing.

    Features:
    - Minimal interface optimized for AI chat usage
    - Integration with Android assistant for quick access
    - Ability to send selected text from other apps to Duck.ai
    - Automatic handling of external links via the default browser
    - File upload and download support

    This app requires an active internet connection and relies on Duck.ai, an external service, to function.
